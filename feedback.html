<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #DFF6FF;
            color: #333;
            margin: 20px;
        }

        h1 {
            text-align: center;
            color: #0077B6;
        }

        .nav {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav a {
            text-decoration: none;
            margin: 0 10px;
            color: #0077B6;
            font-weight: bold;
        }

        .nav a:hover {
            color: #023E8A;
        }

        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #00B4D8;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            display: block;
            margin: 0 auto;
        }

        button:hover {
            background-color: #0077B6;
        }

        .success {
            text-align: center;
            color: green;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<h1>Feedback Form</h1>

    <div class="form-container">
        <form id="feedbackForm">

            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Your Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="rating">Rate the Quiz:</label>
            <select id="rating" name="rating" required>
                <option value="">--Select--</option>
                <option value="Excellent">Excellent</option>
                <option value="Good">Good</option>
                <option value="Average">Average</option>
                <option value="Poor">Poor</option>
            </select>

            <label for="comments">Your Feedback:</label>
            <textarea id="comments" name="comments" rows="4" required></textarea>

            <button type="button" onclick="submitFeedback()">Submit Feedback</button>
        </form>

        <div id="successMessage" class="success"></div>
    </div>

<script>
function submitFeedback() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const rating = document.getElementById('rating').value;
    const comments = document.getElementById('comments').value.trim();

    if (name === '' || email === '' || rating === '' || comments === '') {
        alert('Please fill in all fields.');
        return;
    }

    // You can add backend or Google Forms integration here
    document.getElementById('successMessage').innerHTML = 'Thank you for your feedback, ' + name + '!';

    document.getElementById('feedbackForm').reset();
}
</script>

</body>
</html>
